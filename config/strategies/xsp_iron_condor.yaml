strategy:
  name: "xsp_0dte_iron_condor"
  class: "IronCondorStrategy"
  enabled: true

market:
  symbol: "XSP"
  expiration: "0dte"

entry:
  time_window:
    earliest: "09:45"
    latest: "14:00"
  strike_selection:
    method: "delta"
    short_call_delta: 0.15
    short_put_delta: -0.15
    wing_width: 5
  min_credit: 0.30

exit:
  profit_target_pct: 50
  stop_loss_pct: 200
  time_exit: "15:45"
  prefer_expire: true

position_sizing:
  method: "fixed_risk"
  max_risk_per_trade: 250
  max_contracts: 2

risk:
  max_daily_trades: 1
  pdt_aware: true
