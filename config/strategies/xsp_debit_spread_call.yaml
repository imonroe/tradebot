strategy:
  name: "xsp_0dte_debit_spread_call"
  class: "DebitSpreadStrategy"
  enabled: true

market:
  symbol: "XSP"
  expiration: "0dte"

entry:
  direction: "call"
  time_window:
    earliest: "09:45"
    latest: "14:00"
  strike_selection:
    method: "delta"
    long_delta: 0.40
    short_delta: 0.20
  max_debit: 3.00

exit:
  profit_target_pct: 100
  stop_loss_pct: 75
  time_exit: "15:45"
  prefer_expire: true

position_sizing:
  method: "fixed_risk"
  max_risk_per_trade: 250
  max_contracts: 2

risk:
  max_daily_trades: 1
  pdt_aware: true
